repos:
  - repo: local
    hooks:
      - id: ruff-workers
        name: Ruff Check
        entry: ruff check --force-exclude --fix --exit-non-zero-on-fix
        language: system
        types: [python]

      - id: autopep8-workers
        name: Autopep8
        entry: autopep8 -ai
        language: system
        types: [python]

      - id: pyright-workers
        name: Pyright
        entry: pyright -p workers/
        language: system
        types: [python]
        pass_filenames: false