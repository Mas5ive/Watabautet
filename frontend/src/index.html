<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Watabautet - The Essence Cutter</title>
  <meta name="description" content="Uncover the truth. Instantly." />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Permanent Marker for Punk/Marker headers, VT323 for Terminal/Data text -->
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=VT323&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />

  <style>
    body {
      font-family: 'VT323', monospace;
      background-color: #f3f4f6;
    }

    .font-marker {
      font-family: 'Permanent Marker', cursive;
    }

    .font-terminal {
      font-family: 'VT323', monospace;
    }

    /* Custom scrollbar for the comic feel */
    ::-webkit-scrollbar {
      width: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #000;
    }

    ::-webkit-scrollbar-thumb {
      background: #FACC15;
      border: 2px solid #000;
    }

    /* Halftone noise overlay pattern */
    .bg-comic-noise {
      background-color: #f8f8f8;
      background-image: radial-gradient(#000 1px, transparent 1px), radial-gradient(#000 1px, transparent 1px);
      background-size: 20px 20px;
      background-position: 0 0, 10px 10px;
      opacity: 1;
    }

    .clip-explosion {
      clip-path: polygon(5% 5%, 20% 0%, 35% 5%, 50% 0%, 65% 5%, 80% 0%, 95% 5%,
          100% 20%, 95% 35%, 100% 50%, 95% 65%, 100% 80%, 95% 95%,
          80% 100%, 65% 95%, 50% 100%, 35% 95%, 20% 100%, 5% 95%,
          0% 80%, 5% 65%, 0% 50%, 5% 35%, 0% 20%);
    }

    .clip-jagged {
      clip-path: polygon(0% 5%, 5% 0%, 15% 5%, 25% 0%, 35% 5%, 45% 0%, 55% 5%, 65% 0%, 75% 5%, 85% 0%, 95% 5%, 100% 0%,
          100% 95%, 95% 100%, 85% 95%, 75% 100%, 65% 95%, 55% 100%, 45% 95%, 35% 100%, 25% 95%, 15% 100%, 5% 95%, 0% 100%);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
