# Polling Filtering Rule (GET 202)
map "$request_method:$status" $loggable {
    "GET:202" 0;
    default   1;
}

log_format json_logs escape=json '{'
    '"timestamp":"$time_iso8601",'
    '"request_id":"$request_id",'
    '"client_ip":"$remote_addr",'
    '"request_method":"$request_method",'
    '"uri":"$uri",'
    '"status":$status,'
    '"request_time":$request_time,'
    '"user_agent":"$http_user_agent"'
'}';

server {
    listen       80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    access_log /dev/stdout json_logs if=$loggable;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content Security Policy (CSP) - Production Security Header
    #
    # Security Philosophy:
    # - default-src 'self': Baseline restriction, only same-origin by default
    # - connect-src: API calls to backend service
    # - script-src 'self': No inline scripts allowed (XSS protection)
    # - style-src 'self' 'unsafe-inline': Required for brutalist comic styling with inline CSS
    # - font-src: Google Fonts for custom typography
    # - img-src: Inline SVGs/data URIs + external HTTPS images
    # - frame-ancestors 'none': Prevent embedding in iframes (clickjacking protection)
    # - base-uri 'self': Prevent <base> tag injection
    # - form-action 'self': Restrict form submission targets
    # - upgrade-insecure-requests: Auto-upgrade HTTP to HTTPS
    #
    # Trade-off: 'unsafe-inline' in style-src is intentional. The brutalist comic
    # aesthetic requires inline styles for dynamic effects (ActionBurst, AmpSlider).
    # Consider using CSP nonces in Vite if stricter CSP is needed later.
    add_header Content-Security-Policy "
        default-src 'self';
        connect-src 'self' http://backend:8000;
        script-src 'self';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https:;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
        upgrade-insecure-requests;" always;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Request-ID $request_id;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Handle CORS - use $http_origin for credentials support
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Request-ID" always;
        add_header Access-Control-Allow-Credentials "true" always;
        
        # Handle preflight requests
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 1728000;
            add_header Content-Type 'text/plain; charset=utf-8';
            add_header Content-Length 0;
            return 204;
        }
    }
    
    location / {
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}