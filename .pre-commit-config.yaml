repos:
  - repo: local
    hooks:
      - id: backend-hooks
        name: Backend Service Hooks
        entry: uv run --project backend/ pre-commit run --config backend/.pre-commit-config.yaml --files
        language: system
        files: ^backend/

      - id: workers-hooks
        name: Workers Service Hooks
        entry: uv run --project workers/ pre-commit run --config workers/.pre-commit-config.yaml --files
        language: system
        files: ^workers/
