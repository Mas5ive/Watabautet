repos:
  - repo: local
    hooks:
      - id: ruff-backend
        name: Ruff Check
        entry: ruff check --force-exclude --fix --exit-non-zero-on-fix
        language: system
        types: [python]

      - id: autopep8-backend
        name: Autopep8
        entry: autopep8 -ai
        language: system
        types: [python]

      - id: pyright-backend
        name: Pyright
        entry: pyright -p backend/
        language: system
        types: [python]
        pass_filenames: false